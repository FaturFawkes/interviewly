services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewly-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interviewly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interviewly}
      POSTGRES_DB: ${POSTGRES_DB:-interviewly}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewly -d interviewly"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: interviewly-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: interviewly-backend
    environment:
      PORT: ${PORT:-8080}
      APP_ENV: ${APP_ENV:-docker}
      DATABASE_URL: ${DATABASE_URL:-postgresql://interviewly:interviewly@postgres:5432/interviewly?sslmode=disable}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-1}
      POSTGRES_MAX_CONN_LIFETIME_MINUTES: ${POSTGRES_MAX_CONN_LIFETIME_MINUTES:-30}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-compose-secret}
      JWT_ISSUER: ${JWT_ISSUER:-compose-issuer}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@interviewly.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Interviewly}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-10}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-elevenlabs}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
      ELEVENLABS_TTS_MODEL: ${ELEVENLABS_TTS_MODEL:-eleven_multilingual_v2}
      ELEVENLABS_STT_MODEL: ${ELEVENLABS_STT_MODEL:-scribe_v1}
      ELEVENLABS_AGENT_ID: ${ELEVENLABS_AGENT_ID:-}
      ELEVENLABS_AGENT_BRANCH_ID: ${ELEVENLABS_AGENT_BRANCH_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3000?payment=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3000?payment=cancel}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      STRIPE_PRICE_STARTER_MONTHLY: ${STRIPE_PRICE_STARTER_MONTHLY:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
      STRIPE_PRICE_ELITE_MONTHLY: ${STRIPE_PRICE_ELITE_MONTHLY:-}
      STRIPE_PRICE_VOICE_TOPUP_10: ${STRIPE_PRICE_VOICE_TOPUP_10:-}
      STRIPE_PRICE_VOICE_TOPUP_30: ${STRIPE_PRICE_VOICE_TOPUP_30:-}
      VOICE_TOPUP_10_AMOUNT_IDR: ${VOICE_TOPUP_10_AMOUNT_IDR:-19000}
      VOICE_TOPUP_30_AMOUNT_IDR: ${VOICE_TOPUP_30_AMOUNT_IDR:-49000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:${PORT:-8080}"

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: interviewly-migrate
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "${DATABASE_URL:-postgresql://interviewly:interviewly@postgres:5432/interviewly?sslmode=disable}",
        "up",
      ]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api-proxy}
        NEXT_PUBLIC_DEV_JWT_TOKEN: ${NEXT_PUBLIC_DEV_JWT_TOKEN:-}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    container_name: interviewly-frontend
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-compose-nextauth-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      BACKEND_AUTH_BASE_URL: ${BACKEND_AUTH_BASE_URL:-http://backend:8080}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_AZURE_AD_ID: ${AUTH_AZURE_AD_ID:-}
      AUTH_AZURE_AD_SECRET: ${AUTH_AZURE_AD_SECRET:-}
      AUTH_AZURE_AD_TENANT_ID: ${AUTH_AZURE_AD_TENANT_ID:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api-proxy}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
      NEXT_PUBLIC_DEV_JWT_TOKEN: ${NEXT_PUBLIC_DEV_JWT_TOKEN:-}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
